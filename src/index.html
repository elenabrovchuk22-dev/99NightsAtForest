<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Survival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">FOREST SURVIVAL</div>
    <nav class="nav">
        <a href="#">Главная</a>
        <a href="#">Локации</a>
        <a href="#">Персонажи</a>
        <a href="#">Контакты</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>Выживание в лесу</h1>
        <p>Исследуй. Разжигай костёр. Переживи ночь.</p>
        <button class="btn">Начать игру</button>
    </div>

    <div class="hero-image">
        <img src="" alt="Костёр в лесу">
    </div>
</section>

<section class="gallery">

    <div class="card">
        <img src="" alt="Собака в стиле low poly">
        <h3>Верный спутник</h3>
        <p>Помогает выжить и предупреждает об опасности.</p>
    </div>

    <div class="card">
        <img src="" alt="Ночной лес">
        <h3>Опасная ночь</h3>
        <p>Темнота скрывает неизвестное.</p>
    </div>

    <div class="card">
        <img src="" alt="Лагерь с палаткой">
        <h3>База выживания</h3>
        <p>Построй укрытие и защити себя.</p>
    </div>

</section>

<footer class="footer">
    <p>© 2026 Forest Survival Game</p>
</footer>

</body>
</html>
